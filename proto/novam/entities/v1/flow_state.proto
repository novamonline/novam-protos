syntax = "proto3";

package novam.entities.v1;

option go_package = "github.com/novamonline/novam-protos/gen/go/novam/entities/v1;entitiesv1";

// FlowStateEnvelope holds execution envelope for Process-style flow runs.
message FlowStateEnvelope {
  string flow_definition_id = 1;
  string flow_snapshot_id = 2; // empty for draft
  string flow_state_id = 3; // same as flow_instance_id
  string current_node_id = 4;
  string previous_node_id = 5;
  bool completed = 6;
  bool terminated = 7;
  string terminated_reason = 8;
  string org_id = 9;
  map<string, int64> node_execution_counts = 10;
  int64 flow_iteration_counter = 11;
}

// FlowState is the full state for a Process flow instance (envelope + context).
message FlowState {
  FlowStateEnvelope envelope = 1;
  string context = 2; // JSON object
}

// ActionRequest is sent by the engine when a node requires a client action (e.g. send message).
message ActionRequest {
  string type = 1;
  string payload_json = 2;
}

// ActionResponse is the client's response to an ActionRequest (sent in next Process call).
message ActionResponse {
  string payload_json = 1;
}

// NodeTimeout is used when a step is triggered by a timeout (e.g. delay node wake-up).
message NodeTimeout {
  string flow_instance_id = 1;
  string node_id = 2;
  int64 flow_iteration_counter = 3;
}
